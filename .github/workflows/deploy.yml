name: Deploy to S3

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Deploy to S3
        run: |
          aws s3 sync out/ s3://${{ vars.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "sitemap.xml" \
            --exclude "robots.txt"

          # HTML + SEO files get short cache so updates propagate fast
          aws s3 sync out/ s3://${{ vars.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "sitemap.xml" \
            --include "robots.txt" \
            --exclude "*" \
            --content-type "text/html" \
            --no-guess-mime-type

          # Fix content-type for sitemap and robots
          aws s3 cp s3://${{ vars.S3_BUCKET }}/sitemap.xml s3://${{ vars.S3_BUCKET }}/sitemap.xml \
            --content-type "application/xml" \
            --cache-control "public, max-age=0, must-revalidate" \
            --metadata-directive REPLACE

          aws s3 cp s3://${{ vars.S3_BUCKET }}/robots.txt s3://${{ vars.S3_BUCKET }}/robots.txt \
            --content-type "text/plain" \
            --cache-control "public, max-age=0, must-revalidate" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
